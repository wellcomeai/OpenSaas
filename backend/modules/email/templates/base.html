<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <title>{{ app_name }}</title>
  </head>
  <body style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background:#f6f7f9; margin:0; padding:32px 0;">
    <table align="center" width="600" cellspacing="0" cellpadding="0" style="background:#ffffff; border-radius:8px; padding:32px;">
      <tr>
        <td>
          <h2 style="margin:0 0 16px 0; color:#111;">{{ app_name }}</h2>
          {% block content %}{% endblock %}
          <hr style="border:none; border-top:1px solid #eee; margin:32px 0 16px;">
          <p style="font-size:12px; color:#888; margin:0;">
            Это автоматическое письмо. Не отвечайте на него.<br>
            {{ app_name }} — <a href="{{ app_url }}" style="color:#666;">{{ app_url }}</a>
          </p>
        </td>
      </tr>
    </table>
  </body>
</html>
